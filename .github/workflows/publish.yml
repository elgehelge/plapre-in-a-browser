name: Publish to npm

# Publishes the web/ library to npm when a GitHub Release is published (or on
# manual dispatch). Requires an NPM_TOKEN repository secret (an npm automation
# token). `npm publish` runs prepublishOnly (build:lib) and prepack (copies
# LICENSE/NOTICE into web/) automatically.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Publish
        working-directory: web
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
