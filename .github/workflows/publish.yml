name: Publish to npm

# Publishes the web/ library to npm. On a GitHub Release the version is taken
# from the release tag (e.g. tag v0.2.0 -> 0.2.0), so the release is the single
# source of truth — no manual package.json bump to forget. Reads NPM_TOKEN (a
# long-lived npm automation token) from the "Publish NPM package" environment.
# `npm publish` runs prepublishOnly (build:lib) and prepack (copies LICENSE/
# NOTICE into web/) automatically.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # NPM_TOKEN is an environment secret, so the job must declare the environment.
    environment: Publish NPM package
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Set version from release tag
        if: github.event_name == 'release'
        working-directory: web
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Install
        working-directory: web
        run: npm ci
      - name: Publish
        working-directory: web
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
