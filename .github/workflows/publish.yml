name: Publish to npm

# Publishes the web/ library to npm via OIDC "trusted publishing" — no tokens.
# npmjs.com is configured to trust this repo + this workflow file (publish.yml)
# and the "Publish NPM package" environment. The id-token: write permission lets
# the job mint the short-lived OIDC credential npm exchanges for publish rights;
# provenance attestations are generated automatically (no --provenance needed).
#
# On a GitHub Release the version is taken from the release tag (v0.2.0 -> 0.2.0),
# so the release is the single source of truth — no manual package.json bump.
# `npm publish` runs prepublishOnly (build:lib) and prepack (copies LICENSE/
# NOTICE into web/) automatically.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest # trusted publishing requires a GitHub-hosted runner
    # Must match the environment bound to the trusted publisher on npmjs.com so
    # the OIDC claim lines up.
    environment: Publish NPM package
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Node 24 can ship an npm older than 11.5.1; trusted publishing needs
      # >= 11.5.1 or it fails with misleading ENEEDAUTH/404 errors.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest
      - name: Set version from release tag
        if: github.event_name == 'release'
        working-directory: web
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Install
        working-directory: web
        run: npm ci
      - name: Publish
        working-directory: web
        run: npm publish --access public
